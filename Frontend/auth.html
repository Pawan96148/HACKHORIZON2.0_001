<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - NagrikNetra</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(to bottom, #f0f4f8, #ffffff); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; font-family: 'Inter', sans-serif; }
        .auth-wrapper { background: white; border-radius: 12px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2); max-width: 850px; width: 100%; overflow: hidden; display: flex; }
        .auth-aside { background: linear-gradient(135deg, #e0e7ff 0%, #f0f4f8 100%); color: #1e293b; padding: 40px 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; min-width: 250px; }
        .auth-aside h2 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; }
        .toggle-btn-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .toggle-btn { padding: 12px 15px; border: 2px solid #1e293b; background: transparent; color: #1e293b; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; font-size: 1rem; }
        .toggle-btn.active { background: #1e293b; color: white; }
        .toggle-btn:hover { transform: translateX(5px); }
        .auth-main { padding: 40px; flex: 1; min-width: 300px; }
        .auth-form { display: none; animation: fadeIn 0.4s ease; }
        .auth-form.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header-icon { font-size: 2.5rem; color: #1a237e; margin-bottom: 10px; }
        .auth-header h3 { color: #1a237e; margin: 0 0 5px 0; font-size: 1.5rem; }
        .auth-header p { color: #666; margin: 0; font-size: 0.9rem; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; color: #1a237e; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 0.95rem; transition: all 0.3s ease; font-family: 'Inter', sans-serif; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #1a237e; box-shadow: 0 0 8px rgba(26, 35, 126, 0.2); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .remember-forgot { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; font-size: 0.9rem; }
        .remember-forgot a { color: #1a237e; text-decoration: none; font-weight: 600; }
        .remember-forgot a:hover { text-decoration: underline; }
        .terms-checkbox { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 18px; font-size: 0.85rem; color: #666; }
        .terms-checkbox a { color: #1a237e; text-decoration: none; font-weight: 600; }
        .terms-checkbox a:hover { text-decoration: underline; }
        .btn-submit { width: 100%; padding: 12px; background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(26, 35, 126, 0.4); }
        .social-divider { display: flex; align-items: center; margin: 20px 0; color: #999; font-size: 0.85rem; }
        .social-divider::before, .social-divider::after { content: ''; flex: 1; height: 1px; background: #ddd; }
        .social-divider::before { margin-right: 10px; }
        .social-divider::after { margin-left: 10px; }
        .social-login { display: flex; gap: 12px; margin-bottom: 20px; }
        .btn-social { flex: 1; padding: 11px; border: 2px solid #e0e0e0; background: white; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; }
        .btn-social:hover { border-color: #999; background: #f9f9f9; transform: translateY(-2px); }
        .btn-google { color: #ea4335; }
        .btn-github { color: #333; }
        .password-wrapper { position: relative; display: flex; align-items: center; }
        .password-wrapper input { flex: 1; padding-right: 45px; }
        .password-toggle { position: absolute; right: 10px; background: none; border: none; color: #666; cursor: pointer; padding: 8px; font-size: 16px; transition: color 0.3s ease; }
        .password-toggle:hover { color: #1a237e; }
        .password-toggle.show-password { color: #1a237e; }
        .back-link { position: absolute; top: 20px; left: 20px; }
        .back-link a { color: #1e293b; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 600; transition: all 0.3s ease; }
        .back-link a:hover { gap: 12px; }
        .success-message { display: none; background: #e8f5e9; border: 2px solid #4caf50; color: #2e7d32; padding: 12px; border-radius: 6px; margin-bottom: 15px; animation: slideDown 0.3s ease; text-align: center; font-weight: 600;}
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .auth-wrapper { flex-direction: column; } .auth-aside { padding: 20px 30px; min-width: unset; order: 2; } .auth-main { order: 1; padding: 30px 20px; } .toggle-btn-group { flex-direction: row; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="back-link">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back</a>
    </div>

    <div class="auth-wrapper">
        <div class="auth-aside">
            <h2>Welcome to<br>NagrikNetra</h2>
            <div class="toggle-btn-group">
                <button class="toggle-btn active" onclick="switchForm('login')">
                    <i class="fa-solid fa-sign-in-alt"></i> Login
                </button>
                <button class="toggle-btn" onclick="switchForm('signup')">
                    <i class="fa-solid fa-user-plus"></i> Sign Up
                </button>
            </div>
        </div>

        <div class="auth-main">
            
            <div id="login" class="auth-form active">
                <div class="auth-header">
                    <div class="auth-header-icon"><i class="fa-solid fa-user-shield"></i></div>
                    <h3>Welcome Back</h3>
                    <p>Login to your account</p>
                </div>

                <div class="success-message" id="loginSuccess">
                    <i class="fa-solid fa-check-circle"></i> Login successful! Redirecting...
                </div>

                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" placeholder="your.email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                            <button type="button" class="password-toggle" id="loginPasswordToggle" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="remember-forgot">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember"> Remember me
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-sign-in-alt"></i> Login
                    </button>
                    
                    <div class="social-divider">OR</div>
                    <div class="social-login">
                        <button type="button" class="btn-social btn-google" onclick="loginWithGoogle(event)">
                            <i class="fa-brands fa-google"></i> Google
                        </button>
                        <button type="button" class="btn-social btn-github" onclick="loginWithGitHub(event)">
                            <i class="fa-brands fa-github"></i> GitHub
                        </button>
                    </div>
                </form>

                <p class="auth-footer">
                    Don't have an account? <a href="#" onclick="switchForm('signup'); return false;" class="auth-link">Create one</a>
                </p>
            </div>

            <div id="signup" class="auth-form">
                <div class="auth-header">
                    <div class="auth-header-icon"><i class="fa-solid fa-user-plus"></i></div>
                    <h3>Create Account</h3>
                    <p>Join NagrikNetra today</p>
                </div>

                <div class="success-message" id="signupSuccess">
                    <i class="fa-solid fa-check-circle"></i> Account created successfully! Redirecting...
                </div>

                <form onsubmit="handleSignup(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email Address</label>
                        <input type="email" id="signupEmail" placeholder="your.email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="+91 98765 43210" required>
                    </div>
                    <div class="form-group">
                        <label for="state">State/Union Territory</label>
                        <select id="state" required>
                            <option value="">Select your state</option>
                            <option value="delhi">Delhi</option>
                            <option value="jharkhand">Jharkhand</option>
                            <option value="madhya">Madhya Pradesh</option>
                            <option value="maharashtra">Maharashtra</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="signupPassword" placeholder="Min 8 characters" required>
                            <button type="button" class="password-toggle" id="signupPasswordToggle" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                            <button type="button" class="password-toggle" id="confirmPasswordToggle" aria-label="Toggle password visibility">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="terms-checkbox">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>
                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-user-plus"></i> Create Account
                    </button>
                </form>

                <p class="auth-footer">
                    Already have an account? <a href="#" onclick="switchForm('login'); return false;" class="auth-link">Login here</a>
                </p>
            </div>

        </div>
    </div>

    <script>
        // Form Switcher Logic
        function switchForm(formType) {
            const loginForm = document.getElementById('login');
            const signupForm = document.getElementById('signup');
            const loginBtn = document.querySelectorAll('.toggle-btn')[0];
            const signupBtn = document.querySelectorAll('.toggle-btn')[1];

            if (formType === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                loginBtn.classList.add('active');
                signupBtn.classList.remove('active');
            } else {
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                signupBtn.classList.add('active');
                loginBtn.classList.remove('active');
            }
        }

        // Password Toggle Functionality
        function setupPasswordToggles() {
            // Login password toggle
            const loginToggle = document.getElementById('loginPasswordToggle');
            const loginPassword = document.getElementById('loginPassword');
            
            if (loginToggle && loginPassword) {
                loginToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    togglePasswordVisibility(loginPassword, loginToggle);
                });
            }

            // Signup password toggle
            const signupToggle = document.getElementById('signupPasswordToggle');
            const signupPassword = document.getElementById('signupPassword');
            
            if (signupToggle && signupPassword) {
                signupToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    togglePasswordVisibility(signupPassword, signupToggle);
                });
            }

            // Confirm password toggle
            const confirmToggle = document.getElementById('confirmPasswordToggle');
            const confirmPassword = document.getElementById('confirmPassword');
            
            if (confirmToggle && confirmPassword) {
                confirmToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    togglePasswordVisibility(confirmPassword, confirmToggle);
                });
            }
        }

        function togglePasswordVisibility(passwordInput, toggleButton) {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            
            // Update icon
            const icon = toggleButton.querySelector('i');
            if (icon) {
                icon.className = isPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
            }
            
            // Add visual feedback
            toggleButton.style.transform = 'scale(1.1)';
            setTimeout(() => {
                toggleButton.style.transform = 'scale(1)';
            }, 150);
        }

        // Initialize password toggles when page loads
        document.addEventListener('DOMContentLoaded', function() {
            setupPasswordToggles();
            
            // Handle auth.html form parameter
            if (window.location.pathname.includes('auth.html')) {
                const params = new URLSearchParams(window.location.search);
                if (params.get('form') === 'signup') {
                    setTimeout(() => {
                        const signupFormBtn = document.querySelectorAll('.toggle-btn')[1];
                        if (signupFormBtn) signupFormBtn.click();
                    }, 100);
                }
            }
        });

        // Login Logic
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('https://hackhorizon2-0-001.onrender.com/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save info to browser storage
                    localStorage.setItem('userToken', data.token);
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    document.getElementById('loginSuccess').style.display = 'block';
                    
                    // Go to index.html after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    alert('Login Failed: ' + data.msg);
                }
            } catch (error) {
                console.error('Login Error:', error);
                alert('Connection Error. Make sure your server (node server.js) is running.');
            }
        }

        // Signup Logic
        async function handleSignup(event) {
            event.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            const fullName = firstName + " " + lastName;

            try {
                const response = await fetch('https://hackhorizon2-0-001.onrender.com/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name: fullName, 
                        email: email, 
                        password: password 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save info to browser storage
                    localStorage.setItem('userToken', data.token);
                    localStorage.setItem('userName', fullName);
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('isLoggedIn', 'true');

                    document.getElementById('signupSuccess').style.display = 'block';

                    // Go to index.html after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    alert('Signup Failed: ' + data.msg);
                }
            } catch (error) {
                console.error('Signup Error:', error);
                alert('Connection Error. Make sure your server (node server.js) is running.');
            }
        }

        // Placeholder for Social Logins
        function loginWithGoogle(event) {
            event.preventDefault();
            alert('Google login is not connected yet.');
        }

        function loginWithGitHub(event) {
            event.preventDefault();
            alert('GitHub login is not connected yet.');
        }
    </script>
</body>
</html>
