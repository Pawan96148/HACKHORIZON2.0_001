<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Create Account</h2>
                <p>Sign up to get started</p>
            </div>

            <form class="login-form" id="signupForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="text" id="name" name="name" required autocomplete="name">
                        <label for="name">Full Name</label>
                        <span class="focus-border"></span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required autocomplete="email">
                        <label for="email">Email Address</label>
                        <span class="focus-border"></span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="new-password">
                        <label for="password">Password</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <span class="eye-icon"></span>
                        </button>
                        <span class="focus-border"></span>
                    </div>
                </div>

                <button type="submit" class="login-btn btn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="signup-link">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="../../shared/js/form-utils.js"></script>
    <script>
        // API Call setup for Registration
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('signupForm');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault(); // Page reload hone se rokega

                // Form se data nikalna
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                try {
                    // Backend par POST request bhejna
                    const response = await fetch('http://localhost:3000/user/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ name, email, password }), 
                    });

                    // Response read karna
                    const data = await response.json();

                    if (response.ok) { 
                        // Agar sab theek raha aur data database mein chala gaya
                        alert('Account created successfully! Redirecting to login...');
                        window.location.href = 'login.html'; 
                    } else {
                        // Agar koi error aaya (jaise email already exists)
                        alert('Error: ' + data.msg); 
                    }
                } catch (error) {
                    console.error("Connection error:", error);
                    alert("Server se connect nahi ho paaya. Kya backend chalu hai?");
                }
            });
        });
    </script>
</body>
</html>
